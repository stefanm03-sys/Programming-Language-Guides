<!DOCTYPE html>
<html> <!-- This is a html comment. The <html> tag defines the root element of an HTML page -->

<head> <!-- The <head> tag displays metadata about the webpage like the title, styles, and scripts -->
    <title>Practice</title> <!-- The <title> tag defines the title of the page -->
    <link rel="stylesheet" href="example.css">
    <!-- The <link> tag is used to link to an external resource, like a CSS file -->
    <script src="page.js" defer></script>
    <!-- The <script> tag is used to include JavaScript code -->
</head> <!-- Closing tags match the element name (for example, </p> closes <p>) -->

<body> <!-- The <body> tag contains the visible content of the webpage -->
    <h1>Hello, World!</h1> <!-- The <h1> tag defines a top-level heading. They can go down to <h6> -->
    <p>This is a paragraph tag. It displays information for you to see.</p> <!-- The <p> tag defines a paragraph -->
    <p id="p2">This is another paragraph tag using an id. You can only use this id once for any element.</p>
    <!-- The id attribute is used to assign a unique id for an HTML element. It can be used by CSS and JavaScript to perform certain tasks for the element with the id -->
    <p class="p3">This is another paragraph tag using a class. You can have as many as you want, but they must be associated with the class.</p>
    <!-- The class attribute is used to specify a class for an HTML element. Multiple elements can share the same class, and it can be used by CSS and JavaScript to perform certain tasks for the elements with the class -->
    <button id="btn1">Click Me!</button> <!-- The <button> tag defines a clickable button -->

</body>



</html>
